name: Mirror to CDTA-DMN

on:
  push:
    branches:
      - main  # If your Golden Repo uses "master", change this to master

jobs:
  git-mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to CDTA-DMN Organization
        run: |
          git remote add company https://${{ secrets.SYNC_TOKEN }}@github.com/CDTA-DMN/IHP__RFID4410.git
          git push --force company main
