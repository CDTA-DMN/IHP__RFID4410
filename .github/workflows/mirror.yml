name: Mirror to CDTA-DMN

on:
  push:
    branches:
      - main   # change if your branch is different (e.g. master)

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Mirror push to company
        run: |
          git remote add company https://x-access-token:${{ secrets.SYNC_TOKEN }}@github.com/CDTA-DMN/IHP__RFID4410.git
          git push company --mirror
